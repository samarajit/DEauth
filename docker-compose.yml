version: '3.8'

services:
  app:
    build: .
    container_name: deauth-app
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/deauth?schema=public
      - SESSION_SECRET=${SESSION_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_CALLBACK_URL=${DISCORD_CALLBACK_URL}
      - ADMIN_DISCORD_IDS=${ADMIN_DISCORD_IDS}
      - APP_URL=${APP_URL}
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: deauth-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deauth
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
