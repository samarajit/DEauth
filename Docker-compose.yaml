version: '3.8'

services:
  app:
    build: .
    container_name: tree-auth-app
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/tree
      - SESSION_SECRET=${SESSION_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_CALLBACK_URL=${DISCORD_CALLBACK_URL}
      - ADMIN_DISCORD_IDS=${ADMIN_DISCORD_IDS}
      - APP_URL=${APP_URL}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: tree-auth-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
